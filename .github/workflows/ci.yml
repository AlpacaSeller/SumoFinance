# CI: a ogni push/PR su main girano lint, unit test e build di produzione.
# Le e2e (npm run e2e) restano locali: servono Chrome e, per drive15, Supabase.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verifica:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build

  # e2e: i driver stabili con Chrome headless (drive15/19 richiedono Supabase
  # e restano locali; drive16 usa la rete solo per un errore controllato)
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - run: npm ci
      - run: npm run build
      - run: npm run e2e drive13 drive14 drive17 drive18
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-shots
          path: e2e/shots/

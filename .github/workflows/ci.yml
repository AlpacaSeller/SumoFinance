# CI: a ogni push/PR su main girano lint, unit test e build di produzione.
# Le e2e (npm run e2e) restano locali: servono Chrome e, per drive15, Supabase.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verifica:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
